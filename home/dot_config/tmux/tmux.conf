# FROM https://github.com/zuorn/tmux.conf/blob/master/tmux.conf
# ----------------------------------- Tmux Config -------------------------------------------

# ----------------------------------- prefix -------------------------------------------
# 修改指令前缀
#set -g prefix C-f #
#unbind C-f # C-b 即 Ctrl+b 键，unbind 意味着解除绑定
#bind C-f send-prefix # 绑定 Ctrl+f 为新的指令前缀

# 从tmux v1.6版起，支持设置第二个指令前缀
# set-option -g prefix2 ` # 设置一个不常用的`键作为指令前缀，按键更快些

# 添加载在配置文件指令为： r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded.."
set-window-option -g aggressive-resize on

# ----------------------------------- 更改新增面板键 -------------------------------------------
unbind '"'
bind - splitw -v -c '#{pane_current_path}' # 垂直方向新增面板，默认进入当前目录
unbind %
bind =  splitw -h -c '#{pane_current_path}' # 水平方向新增面板，默认进入当前目录

# ----------------------------------- 开启鼠标支持 -------------------------------------------
# v2.1及以上的版本
set-option -g mouse on
set -g allow-passthrough on
set -s set-clipboard external

# ----------------------------------- vim 风格 -------------------------------------------
# 绑定hjkl键为面板切换的上下左右键

bind -r k select-pane -U # 绑定k为↑
bind -r j select-pane -D # 绑定j为↓
bind -r h select-pane -L # 绑定h为←
bind -r l select-pane -R # 绑定l为→

# 面板调整大小
# 绑定Ctrl+hjkl键为面板上下左右调整边缘的快捷指令

bind -r ^k resizep -U 10 # 绑定Ctrl+k为往↑调整面板边缘10个单元格
bind -r ^j resizep -D 10 # 绑定Ctrl+j为往↓调整面板边缘10个单元格
bind -r ^h resizep -L 10 # 绑定Ctrl+h为往←调整面板边缘10个单元格
bind -r ^l resizep -R 10 # 绑定Ctrl+l为往→调整面板边缘10个单元格

# 复制模式更改为 vi 风格
# 进入复制模式 快捷键：prefix + [

setw -g mode-keys vi # 开启vi风格后，支持vi的C-d、C-u、hjkl等快捷键

# ----------------------------------- 复制粘贴 -------------------------------------------

# 复制模式向 vi 靠拢

# 新版本：
# 进入复制模式 prefix + [
bind -T copy-mode-vi v send -X begin-selection # 开始复制
bind -T copy-mode-vi y send -X copy-selection # 复制剪切板
bind p pasteb # 绑定p键为粘贴文本（p键默认用于进入上一个窗口，不建议覆盖）




# ----------------------------------- 其他 -------------------------------------------

#设置窗口面板起始序号
set -g base-index 1 # 设置窗口的起始下标为1
set -g pane-base-index 1 # 设置面板的起始下标为1
set -s focus-events on
set-window-option -g automatic-rename on
set-window-option -g monitor-activity on


# ----------------------------------- 状态栏 -------------------------------------------

set -wg window-status-format "🪟 #I:#W" # 状态栏窗口名称格式
set -wg window-status-current-format "🪟 #I:#W#F" # 状态栏当前窗口名称格式(#I：序号，#w：窗口名称，#F：间隔符)
set -wg window-status-separator "|" # 状态栏窗口名称之间的间隔
set -g message-style "bg=#202529, fg=#91A8BA" # 指定消息通知的前景、后景色

# 自定义状态栏
set -g status-interval 1 # 状态栏刷新时间
set -g status-justify left # 状态栏列表左对齐
setw -g monitor-activity on # 非当前窗口有内容更新时在状态栏通知

set -g status-left "💻 [#S]> " # 状态栏左侧内容
set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %m/%d %H:%M "

# ----------------------------------- one colors -----------------------------------

# Add truecolor support
set-option -ga terminal-overrides ",xterm-256color:Tc"
# Default terminal is 256 colors
set -g default-terminal "xterm-256color"
set-option -g set-titles on
set-option -g set-titles-string "#T"
set-option -g automatic-rename on

# ----------------------------------- End -------------------------------------------
