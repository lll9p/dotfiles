{{- /* chezmoi:modify-template */ -}}
{{- $old := dict -}}
{{- if ne (.chezmoi.stdin | trim) "" -}}
{{- $old = fromIni .chezmoi.stdin -}}
{{- end -}}

{{- $section := dict -}}
{{- if hasKey $old "Everything" -}}
{{- $section = get $old "Everything" -}}
{{- end -}}

{{- range $entry := list
  (list "match_whole_word" "0")
  (list "match_path" "0")
  (list "match_case" "0")
  (list "match_diacritics" "0")
  (list "match_regex" "1")
  (list "run_in_background" "1")
  (list "show_in_taskbar" "1")
  (list "show_tray_icon" "1")
  (list "minimize_to_tray" "0")
  (list "check_for_updates_on_startup" "0")
  (list "beta_updates" "0")
  (list "language" "2052")
  (list "search_as_you_type" "1")
  (list "match_path_when_search_contains_path_separator" "1")
  (list "match_whole_filename_when_using_wildcards" "1")
  (list "replace_exact_trailing_star_dot_star_with_star" "1")
  (list "allow_exclamation_point_not" "1")
  (list "exclude_list_enabled" "1")
  (list "exclude_hidden_files_and_folders" "0")
  (list "exclude_system_files_and_folders" "1")
  (list "exclude_files" "*.LNK;*.lnk")
  (list "auto_include_fixed_volumes" "1")
  (list "auto_include_removable_volumes" "0")
  (list "auto_remove_offline_ntfs_volumes" "1")
  (list "auto_remove_moved_ntfs_volumes" "1")
  (list "index_size" "1")
  (list "index_date_modified" "1")
  (list "index_recent_changes" "1")
  (list "db_location" "")
  (list "db_compress" "0")
-}}
{{- $section = $section | setValueAtPath (index $entry 0) (index $entry 1) -}}
{{- end -}}

{{- $old = $old | setValueAtPath "Everything" $section -}}
{{- $old | toIni }}
